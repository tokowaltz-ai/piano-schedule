<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ピアノ時間割">
<title>ピアノ時間割</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#fff;--bg2:#f5f5f4;--bg3:#ebebea;
  --text:#1a1a1a;--text2:#777770;--text3:#bbb9b4;
  --bd:rgba(0,0,0,0.13);--bd2:rgba(0,0,0,0.25);
  --home-bg:#B5D4F4;--home-bd:#378ADD;--home-tx:#0C447C;
  --visit-bg:#C0DD97;--visit-bd:#639922;--visit-tx:#27500A;
  --travel-bg:#FAC775;--travel-bd:#BA7517;--travel-tx:#633806;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;
    --text:#f0f0ee;--text2:#aaa9a4;--text3:#555552;
    --bd:rgba(255,255,255,0.1);--bd2:rgba(255,255,255,0.22);
    --home-bg:#0C447C;--home-bd:#378ADD;--home-tx:#B5D4F4;
    --visit-bg:#27500A;--visit-bd:#639922;--visit-tx:#C0DD97;
    --travel-bg:#633806;--travel-bd:#BA7517;--travel-tx:#FAC775;
  }
}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;background:var(--bg);color:var(--text);}

.hdr{display:flex;align-items:center;gap:6px;padding:7px 10px;border-bottom:0.5px solid var(--bd2);background:var(--bg);height:40px;}
.hdr-title{font-size:13px;font-weight:600;color:var(--text);}
.legend{display:flex;gap:6px;align-items:center;margin-left:auto;}
.leg{display:flex;align-items:center;gap:3px;font-size:10px;color:var(--text2);}
.leg-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}

.grid-wrap{position:absolute;top:40px;left:0;right:0;bottom:0;overflow:auto;-webkit-overflow-scrolling:touch;}
table{border-collapse:collapse;table-layout:fixed;}

.th-corner{position:sticky;top:0;left:0;z-index:30;background:var(--bg3);width:36px;min-width:36px;font-size:9px;color:var(--text3);text-align:center;padding:3px 1px;border:0.5px solid var(--bd);}
.th-day{position:sticky;top:0;z-index:20;background:var(--bg3);width:56px;min-width:56px;font-size:11px;font-weight:600;text-align:center;padding:5px 2px;border:0.5px solid var(--bd);color:var(--text);}
.tc-time{position:sticky;left:0;z-index:10;background:var(--bg);width:36px;min-width:36px;font-size:10px;color:var(--text2);text-align:center;padding:0 1px;border:0.5px solid var(--bd);white-space:nowrap;height:16px;}
.cell{width:56px;min-width:56px;height:16px;border:0.5px solid var(--bd);cursor:pointer;-webkit-tap-highlight-color:rgba(0,0,0,0.05);vertical-align:middle;padding:0;}
.cell:active{opacity:0.65;}
.cell-inner{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;padding:0 3px;text-align:center;line-height:1;border-left:2px solid transparent;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.cell-empty{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:10px;}

/* 1時間ごと：やや太め */
.hour-row td{border-top:1.5px solid rgba(0,0,0,0.28) !important;}
@media(prefers-color-scheme:dark){.hour-row td{border-top:1.5px solid rgba(255,255,255,0.28) !important;}}

/* 13:00・17:00：さらに太く濃く */
.break-row td{border-top:2.5px solid rgba(0,0,0,0.55) !important;}
@media(prefers-color-scheme:dark){.break-row td{border-top:2.5px solid rgba(255,255,255,0.55) !important;}}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:flex-end;z-index:200;}
.sheet{background:var(--bg);border-radius:18px 18px 0 0;padding:14px 14px 36px;width:100%;animation:up 0.2s ease;}
@keyframes up{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.sheet-bar{width:32px;height:4px;background:var(--bd2);border-radius:2px;margin:0 auto 12px;}
.sheet-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:12px;}
.sheet label{font-size:12px;color:var(--text2);display:block;margin-bottom:5px;}
.type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:14px;}
.type-btn{height:52px;border-radius:10px;font-size:11px;font-weight:600;cursor:pointer;border:2px solid var(--bd);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:var(--bg2);color:var(--text2);}
.type-btn .icon{font-size:16px;}
.type-btn.sel-home{background:var(--home-bg);border-color:var(--home-bd);color:var(--home-tx);}
.type-btn.sel-visit{background:var(--visit-bg);border-color:var(--visit-bd);color:var(--visit-tx);}
.type-btn.sel-travel{background:var(--travel-bg);border-color:var(--travel-bd);color:var(--travel-tx);}
#name-row input{width:100%;height:44px;font-size:16px;background:var(--bg2);border:0.5px solid var(--bd2);border-radius:10px;padding:0 12px;color:var(--text);outline:none;margin-bottom:14px;}
#name-row input:focus{border-color:var(--home-bd);}
.sheet-btns{display:grid;grid-template-columns:1fr 2fr;gap:8px;}
.btn{height:46px;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;border:none;}
.btn:active{opacity:0.7;}
.btn-del{background:#FCEBEB;color:#A32D2D;}
.btn-save{background:#378ADD;color:#fff;}
@media(prefers-color-scheme:dark){
  .btn-del{background:#501313;color:#F09595;}
  .btn-save{background:#185FA5;color:#E6F1FB;}
}
</style>
</head>
<body>

<div class="hdr">
  <span style="font-size:15px;">🎹</span>
  <span class="hdr-title">ピアノ時間割</span>
  <div class="legend">
    <div class="leg"><div class="leg-dot" style="background:var(--home-bg);border:1px solid var(--home-bd);"></div>自宅</div>
    <div class="leg"><div class="leg-dot" style="background:var(--visit-bg);border:1px solid var(--visit-bd);"></div>出張</div>
    <div class="leg"><div class="leg-dot" style="background:var(--travel-bg);border:1px solid var(--travel-bd);"></div>移動</div>
  </div>
</div>

<div class="grid-wrap">
  <table id="tbl"></table>
</div>

<div id="overlay" class="overlay" style="display:none;">
  <div class="sheet" id="sheet">
    <div class="sheet-bar"></div>
    <div class="sheet-title" id="sheet-ttl"></div>
    <label>種別</label>
    <div class="type-grid">
      <button class="type-btn" id="btn-home"   onclick="selType('home')"><span class="icon">🏠</span><span>自宅</span></button>
      <button class="type-btn" id="btn-visit"  onclick="selType('visit')"><span class="icon">🚗</span><span>出張</span></button>
      <button class="type-btn" id="btn-travel" onclick="selType('travel')"><span class="icon">↔</span><span>移動</span></button>
    </div>
    <div id="name-row">
      <label>生徒名</label>
      <input type="text" id="inp-name" placeholder="例：田中さん" autocomplete="off"/>
    </div>
    <div class="sheet-btns">
      <button class="btn btn-del"  onclick="deleteEntry()">削除</button>
      <button class="btn btn-save" onclick="saveEntry()">保存</button>
    </div>
  </div>
</div>

<script>
const DAYS=['月','火','水','木','金','土'];
const COLORS={
  home:  {bg:'var(--home-bg)',bd:'var(--home-bd)',tx:'var(--home-tx)'},
  visit: {bg:'var(--visit-bg)',bd:'var(--visit-bd)',tx:'var(--visit-tx)'},
  travel:{bg:'var(--travel-bg)',bd:'var(--travel-bd)',tx:'var(--travel-tx)'},
};
const SK='piano_schedule_v2';
let data={},edit=null,curType='home';

function slots(){
  const s=[];
  for(let h=9;h<=20;h++){s.push(h+':00');s.push(h+':30');}
  s.push('21:00');return s;
}
function load(){try{const r=localStorage.getItem(SK);if(r)data=JSON.parse(r);}catch(e){}}
function save(){try{localStorage.setItem(SK,JSON.stringify(data));}catch(e){}}

function build(){
  const sl=slots();
  const t=document.getElementById('tbl');
  t.innerHTML='';

  const thead=document.createElement('thead');
  const hr=document.createElement('tr');
  const tc=document.createElement('th');
  tc.className='th-corner';tc.textContent='時間';hr.appendChild(tc);
  DAYS.forEach(d=>{
    const th=document.createElement('th');
    th.className='th-day';th.textContent=d+'曜';hr.appendChild(th);
  });
  thead.appendChild(hr);t.appendChild(thead);

  const tbody=document.createElement('tbody');
  sl.forEach(s=>{
    const tr=document.createElement('tr');
    const isHour=s.endsWith(':00');
    const isBreak=(s==='13:00'||s==='17:00');

    if(isBreak) tr.classList.add('break-row');
    else if(isHour) tr.classList.add('hour-row');

    const td0=document.createElement('td');
    td0.className='tc-time';
    td0.textContent=isHour?s:'';
    tr.appendChild(td0);

    DAYS.forEach(d=>{
      const k=d+'_'+s;const entry=data[k];
      const td=document.createElement('td');
      td.className='cell';
      td.addEventListener('click',()=>openSheet(d,s));
      if(entry){
        const c=COLORS[entry.type];
        td.style.background=c.bg;
        const div=document.createElement('div');
        div.className='cell-inner';
        div.style.color=c.tx;
        div.style.borderLeftColor=c.bd;
        div.textContent=entry.type==='travel'?'移動':(entry.name||'未入力');
        td.appendChild(div);
      } else {
        const div=document.createElement('div');
        div.className='cell-empty';div.textContent='·';
        td.appendChild(div);
      }
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
  t.appendChild(tbody);
}

function openSheet(day,slot){
  edit={day,slot};
  const k=day+'_'+slot;const e=data[k]||{};
  curType=e.type||'home';
  document.getElementById('sheet-ttl').textContent=day+'曜 '+slot;
  document.getElementById('inp-name').value=e.name||'';
  updateTypeUI();
  document.getElementById('overlay').style.display='flex';
  if(curType!=='travel')setTimeout(()=>document.getElementById('inp-name').focus(),150);
}
function selType(t){curType=t;updateTypeUI();}
function updateTypeUI(){
  ['home','visit','travel'].forEach(t=>{
    document.getElementById('btn-'+t).className='type-btn'+(curType===t?' sel-'+t:'');
  });
  document.getElementById('name-row').style.display=curType==='travel'?'none':'block';
}
function saveEntry(){
  const k=edit.day+'_'+edit.slot;
  data[k]={type:curType,name:document.getElementById('inp-name').value.trim()};
  save();build();closeSheet();
}
function deleteEntry(){
  const k=edit.day+'_'+edit.slot;
  delete data[k];save();build();closeSheet();
}
function closeSheet(){document.getElementById('overlay').style.display='none';edit=null;}
document.getElementById('overlay').addEventListener('click',function(e){if(e.target===this)closeSheet();});
let startY=0;
document.getElementById('sheet').addEventListener('touchstart',e=>{startY=e.touches[0].clientY;},{passive:true});
document.getElementById('sheet').addEventListener('touchend',e=>{if(e.changedTouches[0].clientY-startY>60)closeSheet();});

load();build();
</script>
</body>
</html>
